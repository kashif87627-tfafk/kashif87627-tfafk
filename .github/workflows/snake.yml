name: Generate Neon Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Neon Snake (Dark Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: kashif87627-tfafk
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=cyan
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=cyan

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
